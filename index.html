<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One-Page Site</title>
  <meta name="description" content="A clean one-page site with an easy-to-swap background image." />
  <meta name="theme-color" content="#0f172a" />

  <style>
    :root {
      --bg-image: url('assets/images/raymour.png');
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      background-attachment: scroll;
    }
  </style>
</head>

<body>
  <script>
    window.__SYNTHFLOW_WIDGET__ = {
      modelId: "88b8b323-cced-49a1-87c0-c7f8ff89c526",
      agentDisplayName: "Sofia",
      /** Cloudflare Pages Function at /api/synthflow-chat (see functions/api/) */
      proxyUrl: "/api/synthflow-chat"
    };
  </script>
  <script src="assets/synthflow-chat-widget.js" defer></script>
</body>
</html>
